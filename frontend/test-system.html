<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统功能测试 - 人才测评系统</title>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f7fa; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; }
        h1 { color: #303133; margin-bottom: 20px; }
        .test-item { padding: 15px; margin-bottom: 10px; background: #fafafa; border-radius: 4px; }
        .test-item h3 { margin-bottom: 10px; color: #606266; }
        .status { padding: 5px 10px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        .status.pass { background: #f0f9ff; color: #0288d1; }
        .status.fail { background: #fff7e6; color: #fa8c16; }
        button { padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        button:hover { background: #5568d3; }
        .result { margin-top: 10px; padding: 10px; background: #f5f7fa; border-radius: 4px; font-size: 14px; max-height: 200px; overflow-y: auto; }
        .btn-group { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>人才测评系统 - 功能测试</h1>
        
        <div class="btn-group">
            <button onclick="testLogin()">测试登录</button>
            <button onclick="testTools()">测试测评工具</button>
            <button onclick="testAll()">测试全部</button>
        </div>
        
        <div class="test-item">
            <h3>1. 登录测试 <span id="loginStatus" class="status">待测试</span></h3>
            <button onclick="testLogin()">执行测试</button>
            <div id="loginResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-item">
            <h3>2. 测评工具加载测试 <span id="toolsStatus" class="status">待测试</span></h3>
            <button onclick="testTools()">执行测试</button>
            <div id="toolsResult" class="result" style="display: none;"></div>
        </div>
        
        <div class="test-item">
            <h3>3. 系统状态</h3>
            <p>后端服务: <span id="backendStatus">检查中...</span></p>
            <p>数据库: <span id="dbStatus">检查中...</span></p>
        </div>
    </div>
    
    <script>
        let token = '';
        
        async function testLogin() {
            const statusEl = document.getElementById('loginStatus');
            const resultEl = document.getElementById('loginResult');
            
            statusEl.textContent = '测试中...';
            statusEl.className = 'status';
            resultEl.style.display = 'block';
            resultEl.textContent = '正在测试登录...';
            
            try {
                const response = await axios.post('<SIGNED_URL_REMOVED> {
                    username: 'admin',
                    password: 'admin123'
                });
                
                if (response.data.success) {
                    token = response.data.token;
                    statusEl.textContent = '通过';
                    statusEl.className = 'status pass';
                    resultEl.textContent = '✅ 登录成功！\n\nToken: ' + token.substring(0, 50) + '...\n\n用户: ' + JSON.stringify(response.data.user, null, 2);
                } else {
                    statusEl.textContent = '失败';
                    statusEl.className = 'status fail';
                    resultEl.textContent = '❌ 登录失败: ' + response.data.message;
                }
            } catch (error) {
                statusEl.textContent = '失败';
                statusEl.className = 'status fail';
                resultEl.textContent = '❌ 请求失败: ' + error.message;
            }
        }
        
        async function testTools() {
            const statusEl = document.getElementById('toolsStatus');
            const resultEl = document.getElementById('toolsResult');
            
            if (!token) {
                alert('请先测试登录！');
                return;
            }
            
            statusEl.textContent = '测试中...';
            statusEl.className = 'status';
            resultEl.style.display = 'block';
            resultEl.textContent = '正在加载测评工具...';
            
            try {
                const response = await axios.get('<SIGNED_URL_REMOVED> {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (response.data.success) {
                    statusEl.textContent = '通过';
                    statusEl.className = 'status pass';
                    resultEl.textContent = '✅ 测评工具加载成功！\n\n工具数量: ' + response.data.tools.length + '\n\n工具列表:\n' + JSON.stringify(response.data.tools, null, 2);
                } else {
                    statusEl.textContent = '失败';
                    statusEl.className = 'status fail';
                    resultEl.textContent = '❌ 加载失败: ' + response.data.message;
                }
            } catch (error) {
                statusEl.textContent = '失败';
                statusEl.className = 'status fail';
                resultEl.textContent = '❌ 请求失败: ' + error.message;
            }
        }
        
        async function testAll() {
            await testLogin();
            setTimeout(() => testTools(), 1000);
        }
        
        async function checkSystem() {
            try {
                const response = await axios.get('<SIGNED_URL_REMOVED>
                document.getElementById('backendStatus').textContent = '✅ 正常运行';
                document.getElementById('backendStatus').style.color = '#67c23a';
            } catch (error) {
                document.getElementById('backendStatus').textContent = '❌ 无法连接';
                document.getElementById('backendStatus').style.color = '#f56c6c';
            }
        }
        
        checkSystem();
    </script>
</body>
</html>

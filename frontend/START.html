<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人才测评系统 - 启动页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: #303133;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #909399;
            font-size: 16px;
        }
        
        .status {
            background: #f0f9ff;
            border: 1px solid #91caff;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .status.running {
            background: #f6ffed;
            border-color: #b7eb8f;
        }
        
        .status-text {
            font-size: 16px;
            color: #0066cc;
            font-weight: bold;
        }
        
        .status.running .status-text {
            color: #389e0d;
        }
        
        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .link-card {
            background: #f5f7fa;
            border: 2px solid #e4e7ed;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            color: #303133;
            transition: all 0.3s;
        }
        
        .link-card:hover {
            border-color: #409eff;
            background: #ecf5ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64,158,255,0.2);
        }
        
        .link-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #409eff;
        }
        
        .link-card p {
            font-size: 14px;
            color: #909399;
        }
        
        .info {
            background: #fff7e6;
            border: 1px solid #ffd591;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .info h3 {
            color: #d48806;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .info ul {
            list-style: none;
            padding-left: 0;
        }
        
        .info li {
            padding: 5px 0;
            color: #8c8c8c;
            font-size: 14px;
        }
        
        .info li:before {
            content: "✓ ";
            color: #52c41a;
            font-weight: bold;
        }
        
        .login-info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        
        .login-info h3 {
            color: #1890ff;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .credentials {
            display: inline-block;
            background: white;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            color: #303133;
        }
        
        .credentials strong {
            color: #409eff;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #c0c4cc;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 人才测评系统</h1>
            <p>基于SHL & 北森对标开发的专业人才测评平台</p>
        </div>
        
        <div class="status running">
            <span class="status-text">✅ 系统运行正常</span>
        </div>
        
        <div class="links">
            <a href="/index-complete.html" class="link-card">
                <h3>📊 完整系统</h3>
                <p>访问完整功能版系统</p>
            </a>
            
            <a href="/test-system.html" class="link-card">
                <h3>🧪 系统测试</h3>
                <p>测试系统各项功能</p>
            </a>
            
            <a href="/index.html" class="link-card">
                <h3>🏠 主界面</h3>
                <p>访问系统主界面</p>
            </a>
            
            <a href="/api/health" class="link-card">
                <h3>💡 API状态</h3>
                <p>查看后端API状态</p>
            </a>
        </div>
        
        <div class="info">
            <h3>📋 系统功能</h3>
            <ul>
                <li>用户登录与身份认证</li>
                <li>7个专业测评工具（大五人格、MBTI、DISC等）</li>
                <li>测评项目管理</li>
                <li>测评任务管理</li>
                <li>人才九宫格展示</li>
                <li>测评报告生成</li>
            </ul>
        </div>
        
        <div class="login-info">
            <h3>🔑 登录信息</h3>
            <div class="credentials">
                <strong>用户名:</strong> admin<br>
                <strong>密码:</strong> admin123
            </div>
        </div>
        
        <div class="footer">
            <p>人才测评系统 V2.0 | 基于SHL & 北森对标开发</p>
            <p>访问地址: <ADDRESS_REMOVED>
        </div>
    </div>
</body>
</html>

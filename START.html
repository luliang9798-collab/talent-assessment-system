<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人才测评系统 - 启动页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Microsoft YaHei', Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            max-width: 500px; 
            width: 90%; 
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            color: #303133; 
            font-size: 28px; 
        }
        .info { 
            background: #f0f9ff; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            line-height: 1.8; 
        }
        .info strong { 
            color: #0288d1; 
        }
        .btn { 
            display: block; 
            width: 100%; 
            padding: 12px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            margin-bottom: 10px; 
            text-align: center; 
            text-decoration: none; 
        }
        .btn:hover { 
            background: #5568d3; 
        }
        .status { 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 20px; 
            text-align: center; 
        }
        .status.ok { 
            background: #f0f9ff; 
            color: #0288d1; 
        }
        .status.error { 
            background: #fff7e6; 
            color: #fa8c16; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>人才测评系统</h1>
        
        <div class="status ok">
            ✅ 系统已成功部署！
        </div>
        
        <div class="info">
            <strong>系统说明：</strong><br>
            本系统基于SHL和北森测评系统设计，提供专业的人才测评功能。<br><br>
            <strong>登录信息：</strong><br>
            用户名: admin<br>
            密码: admin123<br><br>
            <strong>主要功能：</strong><br>
            • 7个专业测评工具<br>
            • 测评项目管理<br>
            • 专业的测评报告<br>
            • 人才九宫格可视化
        </div>
        
        <a href="/index-complete.html" class="btn">进入系统</a>
        <a href="/test-system.html" class="btn" style="background: #67c23a;">系统测试页</a>
        
        <div style="margin-top: 20px; padding: 15px; background: #f5f7fa; border-radius: 8px; font-size: 14px; color: #606266;">
            <strong>使用步骤：</strong><br>
            1. 点击"进入系统"按钮<br>
            2. 使用 admin / admin123 登录<br>
            3. 选择测评工具开始测评<br>
            4. 查看测评报告和分析
        </div>
    </div>
</body>
</html>

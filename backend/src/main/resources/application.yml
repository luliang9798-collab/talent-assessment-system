server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: talent-assessment-system
  
  datasource:
    url: jdbc:mysql://localhost:3306/talent_assessment?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# JWT配置
jwt:
  secret: talent-assessment-secret-key-2024
  expiration: 86400

# 文件上传配置
app:
  upload:
    path: /data/uploads
    max-file-size: 10MB
    allowed-extensions: .xlsx,.xls,.csv

# 日志配置
logging:
  level:
    com.talent.assessment: DEBUG
    org.springframework.security: INFO
  file:
    name: logs/talent-assessment.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
